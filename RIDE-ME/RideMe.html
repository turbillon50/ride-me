<style>
  html, body {
    margin: 0; padding: 0; width: 100%; height: 100%;
    background: var(--rm-surface, #fff);
    overscroll-behavior: none;
    overflow-x: hidden;
    -webkit-tap-highlight-color: transparent;
    -webkit-user-select: none; user-select: none;
    touch-action: manipulation;
    color-scheme: light dark;
  }
  body {
    font-family: 'Inter', -apple-system, system-ui, sans-serif;
    overflow: hidden;
    color: var(--rm-text, #0D1B3D);
    /* Soporte para safe-area en iOS sin agregar barra fija */
  }
  #root { width: 100%; height: 100dvh; min-height: 100dvh; }
  input, textarea, [contenteditable="true"] { -webkit-user-select: text; user-select: text; }
  /* Prevenir zoom en iOS al hacer focus en inputs (font-size mínimo 16px) */
  input, textarea, select { font-size: 16px; }
  /* Hidden de barra de scroll */
  ::-webkit-scrollbar { width: 0; height: 0; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="scripts/i18n-es.js"></script>
<script src="scripts/i18n-en.js"></script>
<script>
  window.RM_I18N_ES = RM_I18N_ES;
  window.RM_I18N_EN = RM_I18N_EN;
</script>

<script type="text/babel" src="scripts/icons.jsx"></script>
<script type="text/babel" src="scripts/map.jsx"></script>
<script type="text/babel" src="scripts/store.jsx"></script>
<script type="text/babel" src="scripts/ui.jsx"></script>
<script type="text/babel" src="scripts/screens-auth.jsx"></script>
<script type="text/babel" src="scripts/screens-passenger-1.jsx"></script>
<script type="text/babel" src="scripts/screens-passenger-2.jsx"></script>
<script type="text/babel" src="scripts/screens-passenger-3.jsx"></script>
<script type="text/babel" src="scripts/screens-driver.jsx"></script>
<script type="text/babel" src="scripts/screens-admin.jsx"></script>
<script type="text/babel" src="scripts/app-pwa.jsx"></script>

<script>
  // ─── Service Worker con auto-update ──────────────────────────────────
  if ('serviceWorker' in navigator) {
    // Si la página NO tenía controlador antes (primer install), no recargues
    // — solo recargar si es un cambio real de versión.
    let firstControllerEver = !navigator.serviceWorker.controller;
    let reloadOnce = false;
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      if (firstControllerEver) { firstControllerEver = false; return; }
      if (reloadOnce) return;
      reloadOnce = true;
      window.location.reload();
    });
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js', { updateViaCache: 'none' }).then((reg) => {
        // Pedir actualización al cargar
        reg.update().catch(() => {});
        if (reg.waiting) reg.waiting.postMessage('SKIP_WAITING');
        reg.addEventListener('updatefound', () => {
          const newSw = reg.installing;
          if (!newSw) return;
          newSw.addEventListener('statechange', () => {
            if (newSw.state === 'installed' && navigator.serviceWorker.controller) {
              // Hay una nueva versión esperando: actívala.
              newSw.postMessage('SKIP_WAITING');
            }
          });
        });
      }).catch(() => {});
    });
  }

  // ─── Install prompt (Add to Home Screen) ────────────────────────────
  let deferredPrompt = null;
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    window.__rmInstallPrompt = deferredPrompt;
  });
  window.rmTriggerInstall = async () => {
    if (!deferredPrompt) return false;
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    deferredPrompt = null;
    return outcome === 'accepted';
  };
</script>
</body>
</html>
